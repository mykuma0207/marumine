<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>マルマインのゴロゴロ大作戦</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="orientation-warning">
        🔄 スマホを横向きにしてプレイしてください
    </div>

    <div id="game-container">
        <!-- UI表示エリア -->
        <div id="hud-container">
            <div id="score-wrap">
                <div id="score-container">SCORE: <span id="score">0</span></div>
                <div id="hud-hi-score-container">HI-SCORE: <span id="hud-hi-score">0</span></div>
            </div>
            
            <div id="life-container">
                <button id="pause-btn">⏸️</button>
                LIFE: <span id="life">❤️❤️❤️</span>
            </div>
        </div>
        
        <!-- ゲーム画面 -->
        <div id="game-stage">
            <div id="player"></div>
            <div id="explosion">💥</div>
        </div>

        <!-- スマホ用エレキボール発射ボタン -->
        <button id="attack-btn" class="pos-top-left">エレキボール</button>

        <!-- 遊び方説明ポップアップ -->
        <div id="how-to-modal" class="modal-mask">
            <div class="modal-content">
                <h2>📖 遊び方説明</h2>
                <div class="modal-inner-text">
                    <p><strong>【画面の左（または右）をタップ】</strong><br>通常ジャンプ / 空中でさらにもう一回タップで2段ジャンプ！</p>
                    <p><strong>【「エレキボール」ボタンをタップ】</strong><br>上・中・下すべてが塞がった紫の壁を、一撃で吹き飛ばすぞ！</p>
                </div>
                <button id="how-to-close-btn" class="modal-close-btn">閉じる</button>
            </div>
        </div>

        <!-- 世界共通オンラインランキングポップアップ -->
        <div id="ranking-modal" class="modal-mask">
            <div class="modal-content">
                <h2>🏆 世界ランキング (TOP 5)</h2>
                <ol id="ranking-list">
                    <!-- 通信して取得した世界の順位が自動挿入されます -->
                </ol>
                <button id="ranking-close-btn" class="modal-close-btn">閉じる</button>
            </div>
        </div>

        <!-- メインメニュー ＆ ゲームオーバー画面 -->
        <div id="overlay">
            <h1 id="game-title">マルマインのゴロゴロ大作戦</h1>
            
            <div id="result-container">
                <p id="top-hi-score-wrap">GLOBAL HI-SCORE: <span id="res-hi-score">0</span></p>
                <div id="gameover-scores" style="display: none;">
                    <p>YOUR SCORE: <span id="res-score">0</span></p>
                    <p>BEST SCORE: <span id="res-best-score">0</span></p>
                </div>
            </div>

            <!-- ゲームオーバー用：世界ランキング送信欄 -->
            <div id="send-score-container" style="display: none;">
                <p>世界ランキングに登録しよう！</p>
                <div class="input-row">
                    <input type="text" id="player-name-input" maxlength="5" placeholder="なまえ(5文字)">
                    <button id="send-score-btn">送信</button>
                </div>
            </div>

            <!-- トップ画面の設定・追加ボタン欄 -->
            <div id="menu-settings">
                <p>【 ボタンの位置設定 】</p>
                <div class="setting-row">
                    <button id="btn-set-left" class="active">左上</button>
                    <button id="btn-set-right">右上</button>
                </div>
                <div class="menu-sub-btns">
                    <button id="how-to-open-btn">📖 遊び方</button>
                    <button id="ranking-open-btn">🏆 ランキング</button>
                </div>
            </div>

            <button id="start-btn">START</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

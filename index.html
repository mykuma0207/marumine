<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>マルマインのゴロゴロ大作戦 EX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 縦向きの時の警告 -->
    <div id="orientation-warning">
        🔄 スマホを横向きにしてプレイしてください
    </div>

    <!-- ゲーム全体の容器 -->
    <div id="game-container">
        <!-- UI表示エリア -->
        <div id="hud-container">
            <div id="score-container">SCORE: <span id="score">0</span></div>
            <div id="life-container">LIFE: <span id="life">❤️❤️❤️</span></div>
        </div>
        
        <!-- ゲームステージ -->
        <div id="game-stage">
            <div id="player"></div>
            <div id="explosion">💥</div>
        </div>

        <!-- エレキボール発射ボタン -->
        <button id="attack-btn" class="pos-top-right">⚡️ ATTACK</button>

        <!-- メインメニュー ＆ ゲームオーバー画面 -->
        <div id="overlay">
            <h1 id="game-title">MARUMINE ROLL EX</h1>
            
            <div id="result-container" style="display: none;">
                <p>YOUR SCORE: <span id="res-score">0</span></p>
                <p>HI-SCORE: <span id="res-hi-score">0</span></p>
            </div>

            <div id="menu-settings">
                <p>【 攻撃ボタンの位置設定 】</p>
                <div class="setting-row">
                    <button id="btn-set-left">左上</button>
                    <button id="btn-set-right" class="active">右上</button>
                </div>
            </div>

            <button id="start-btn">START</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

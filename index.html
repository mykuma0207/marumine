<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>マルマインのゴロゴロ大作戦</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="orientation-warning">
        🔄 スマホを横向きにしてプレイしてください
    </div>

    <div id="game-container">
        <!-- UI表示エリア -->
        <div id="hud-container">
            <div id="score-wrap">
                <div id="score-container">SCORE: <span id="score">0</span></div>
                <div id="hud-hi-score-container">HI-SCORE: <span id="hud-hi-score">0</span></div>
            </div>
            
            <div id="life-container">
                <button id="pause-btn">⏸️</button>
                LIFE: <span id="life">❤️❤️❤️</span>
            </div>
        </div>
        
        <!-- ゲーム画面 -->
        <div id="game-stage">
            <div id="player"></div>
            <div id="explosion">💥</div>
        </div>

        <button id="attack-btn" class="pos-top-left">エレキボール</button>

        <!-- 遊び方説明ポップアップ -->
        <div id="how-to-modal" class="modal-mask">
            <div class="modal-content">
                <h2>📖 遊び方説明</h2>
                <div class="modal-inner-text">
                    <p><strong>【画面の左（または右）をタップ】</strong><br>通常ジャンプ / 空中でさらもう一回タップで2段ジャンプ！</p>
                    <p><strong>【「エレキボール」ボタンをタップ】</strong><br>上・中・下すべてが塞がった紫の壁を、一撃で吹き飛ばすぞ！</p>
                </div>
                <button id="how-to-close-btn" class="modal-close-btn">閉じる</button>
            </div>
        </div>

        <!-- 世界共通オンラインランキングポップアップ -->
        <div id="ranking-modal" class="modal-mask">
            <div class="modal-content">
                <h2>🏆 世界ランキング (TOP 5)</h2>
                <ol id="ranking-list">
                    <!-- 順位が自動挿入されます -->
                </ol>
                <button id="ranking-close-btn" class="modal-close-btn">閉じる</button>
            </div>
        </div>

        <!-- 🪟 メインメニュー（Flexboxによる完全一括管理ボックス） -->
        <div id="title-menu" class="overlay-screen">
            <div id="menu-content-wrapper">
                <h1 class="screen-title">マルマインのゴロゴロ大作戦</h1>
                
                <div class="score-display-box">
                    <p>HI-SCORE: <span id="res-hi-score">0</span></p>
                </div>
                
                <div class="settings-box">
                    <p>【 攻撃ボタンの位置設定 】</p>
                    <div class="setting-row">
                        <button id="btn-set-left" class="active">左側</button>
                        <button id="btn-set-right">右側</button>
                    </div>
                </div>

                <!-- 🟢 誤タップ防止：左右の端に完全に分離させたサブボタンエリア -->
                <div class="menu-sub-btns-wide">
                    <button id="how-to-open-btn">📖 遊び方</button>
                    <button id="ranking-open-btn">🏆 ランキング</button>
                </div>
                
                <button id="start-btn">START</button>
            </div>
        </div>

        <!-- 🪟 ゲームオーバー画面専用の部屋（初期状態は非表示） -->
        <div id="gameover-menu" class="overlay-screen" style="display: none;">
            <h1 class="screen-title text-red">GAME OVER</h1>
            <div class="score-display-box">
                <p>YOUR SCORE: <span id="res-score">0</span></p>
                <p class="text-teal">BEST SCORE: <span id="res-best-score">0</span></p>
            </div>
            <div id="send-score-container">
                <p>世界ランキングに登録しよう！</p>
                <div class="input-row">
                    <input type="text" id="player-name-input" maxlength="5" placeholder="なまえ(5文字)">
                    <button id="send-score-btn">送信</button>
                </div>
            </div>
            <button id="back-to-top-btn">BACK TO TOP</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
